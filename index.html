<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 AFK DASHBOARD - NIGHT BLUE MONITOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Mitr:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-main: #06080c;
            --border-main: #7cd6ff; 
            --card-bg: #0b0e14;
            --cyber-blue: #00bfff;
            --cyber-glow: rgba(124, 214, 255, 0.15); 
        }
        
        html {
            scroll-behavior: smooth;
        }

        body { 
            background-color: var(--bg-main); 
            color: #e2e8f0; 
            font-family: 'Mitr', sans-serif;
            image-rendering: pixelated;
            background-image: linear-gradient(rgba(15, 23, 42, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(15, 23, 42, 0.5) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }
        
        .cyber-header {
            background: linear-gradient(135deg, #0b0e14 0%, #111622 100%);
            border: 3px solid var(--border-main);
            box-shadow: 0 0 12px var(--cyber-glow), inset 0 0 8px rgba(124, 214, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        .cyber-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--border-main), transparent);
            animation: scanline 5s linear infinite; 
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .pixel-box {
            background: var(--card-bg);
            border: 3px solid #1a2233;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .pixel-card {
            background: #0b0e14;
            border: 3px solid #161f30;
            box-shadow: 6px 6px 0px #000000;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .pixel-card:hover {
            border-color: var(--border-main);
            box-shadow: 6px 6px 0px var(--cyber-glow);
            transform: translateY(-2px);
        }
        
        .pixel-btn {
            background: #ffffff;
            color: #000000;
            border: 3px solid #000000;
            box-shadow: 0px 4px 0px #1a2233;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .pixel-btn:hover {
            background: #7cd6ff;
            box-shadow: 0px 4px 0px #0b4d6e;
        }
        .pixel-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px #000000;
        }

        .pixel-btn-neon {
            background: #0f1420;
            color: #7cd6ff;
            border: 3px solid #7cd6ff;
            box-shadow: 0px 4px 0px #0b4d6e;
            transition: all 0.2s ease;
        }
        .pixel-btn-neon:hover {
            background: #7cd6ff;
            color: #000000;
            box-shadow: 0 0 8px var(--cyber-glow);
        }
        .pixel-btn-neon:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px #000000;
        }
        
        .rpg-bar-container { 
            background: #000000; 
            height: 16px; 
            border: 2px solid #1a2233;
            padding: 1px;
        }
        .bar-energy { background: #ff4a4a; box-shadow: 0 0 6px rgba(255, 74, 74, 0.4); }
        .bar-brain { background: #00bfff; box-shadow: 0 0 6px rgba(0, 191, 255, 0.4); }

        .clickable { cursor: pointer; }

        .expand-content { 
            max-height: 0;
            overflow: hidden; 
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease, opacity 0.3s ease; 
            opacity: 0;
        }
        .expanded .expand-content { 
            max-height: 1200px; 
            padding-top: 1rem;
            opacity: 1;
        }

        .emoji-btn { 
            border: 3px solid transparent; 
            background: #111622;
            transition: all 0.2s ease;
        }
        .emoji-btn:hover { border-color: #44526e; }
        .emoji-btn.selected { 
            border-color: var(--border-main); 
            background: #ffffff;
        }
        
        .star-active { color: #ffd700; text-shadow: 0 0 8px #ffd700; }

        .cyber-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #161f30;
            border: 1px solid #2a374e;
            outline: none;
            border-radius: 3px;
        }
        .cyber-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #7cd6ff;
            border: 2px solid #000;
            cursor: pointer;
            box-shadow: 0 0 6px #7cd6ff;
            transition: transform 0.1s ease;
        }
        .cyber-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        #bottomMasterAlert {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 100%;
            max-width: 420px;
            padding: 0 16px;
            display: none; 
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 50px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .modal-bg {
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .live-pulse {
            animation: pulse-blue 2.5s infinite;
        }
        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(124, 214, 255, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(124, 214, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(124, 214, 255, 0); }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

        <!-- HEADER ZONE -->
        <div class="cyber-header p-5 md:p-6 flex flex-col lg:flex-row justify-between items-center gap-6 rounded-none">

    <!-- MASTER POPUP CONTAINER -->

                <input type="hidden" id="add_char_emoji" value="🐬">

    <!-- MODAL: EDIT UNIT STATUS -->
    <div id="editModal" class="hidden modal-bg fixed inset-0 bg-black/80 flex justify-center items-center p-4 z-50">
        <div class="pixel-box p-6 w-full max-w-md bg-[#0b0e14]">
            <h3 class="text-xs font-bold text-white pixel-font mb-4">▶ EDIT PROFILE</h3>
            <input type="hidden" id="edit_old_id">

                <div class="grid grid-cols-5 gap-2 p-2 bg-black/40 border-2 border-slate-800" id="edit_emoji_pool"></div>
                <input type="hidden" id="edit_char_emoji">
                <input type="text" id="edit_char_name" class="w-full bg-black text-white border-2 border-slate-800 p-3 text-sm font-bold outline-none focus:border-[#7cd6ff] transition-colors">
                
                <div class="grid grid-cols-2 gap-3">

    <!-- MODAL: ADD MISSION -->
    <div id="afkModal" class="hidden modal-bg fixed inset-0 bg-black/80 flex justify-center items-center p-4 z-50">
        <div class="pixel-box p-6 w-full max-w-sm bg-[#0b0e14]">
            <h3 class="text-xs font-bold text-white pixel-font mb-4">▶ ADD MISSION</h3>
            <input type="hidden" id="afk_char_name">
            <div class="space-y-4">
                <input type="text" id="afk_task_name" class="w-full bg-black text-white border-2 border-slate-800 p-3 text-sm outline-none focus:border-[#7cd6ff] transition-colors" placeholder="MISSION NAME...">
                <input type="number" id="afk_minutes" class="w-full bg-black text-white border-2 border-slate-800 p-3 text-sm outline-none focus:border-[#7cd6ff] transition-colors" placeholder="MINUTES...">
            </div>
            <div class="flex gap-4 mt-6">
                <button onclick="closeModal('afkModal')" class="flex-1 bg-slate-800 text-white py-2 font-bold text-xs hover:bg-slate-700 transition-colors">CLOSE</button>
                <button onclick="submitAFK()" class="flex-1 pixel-btn text-xs py-2">START</button>

        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://fupvihpfjstxqqcrmmmd.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1cHZpaHBmanN0eHFxY3JtbW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4ODU3NDksImV4cCI6MjA5NTQ2MTc0OX0.9uRBUPwDFlPB7cxpsi-HQeaiym5cjAU4u4uzUAFjYJU";
        const FOOD_DECAY = 100 / (2 * 60 * 60); 
        const BRAIN_GROW = 100 / (2.5 * 60 * 60);
        const EMOJIS = ["🐬", "🐳", "🐋", "🦈", "🐙", "🐚", "🦀", "🦞", "🦐", "🐠", "🐡", "🐢", "🦦", "🐧", "⛵"];

        let supabaseClient = null;
        let cachedCharacters = {};
        let expandedStates = {};
        let currentCols = 1; 
        
        let isMuted = false; 
        let completedMissionsTracker = {}; 

        // ฟังก์ชันแปลงวินาทีที่เหลืออยู่ ให้แสดงเป็น "XX M XX S" หรือ "XX H XX M XX S"
        function formatTimeWithSeconds(totalSeconds) {
            if (totalSeconds <= 0) return 'SUCCESS';
            const hrs = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = Math.floor(totalSeconds % 60);
            
            if (hrs > 0) {
                return `${hrs}H ${mins}M ${secs}S`;
            }
            return `${mins}M ${secs}S`;
        }

        function playBeepSound() {
            if (isMuted) return; 
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.12);
            } catch(e) {}
        }

        window.addEventListener('DOMContentLoaded', () => {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const savedCols = localStorage.getItem('afk_display_cols');
            if(savedCols) {
                currentCols = parseInt(savedCols);
                document.getElementById('columnSlider').value = currentCols;
            }
            changeGridColumns(currentCols);

            const savedMute = localStorage.getItem('afk_is_muted');
            if (savedMute === 'true') {
                isMuted = true;
                document.getElementById('muteBtn').innerText = '🔇';
            }

            fetchData();
            buildEmojiPools();
            setInterval(tick, 1000);
        });

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem('afk_is_muted', isMuted);
            document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊';
        }

        function changeGridColumns(val) {
            currentCols = parseInt(val);
            document.getElementById('colValue').innerText = currentCols;
            localStorage.setItem('afk_display_cols', currentCols);

            const container = document.getElementById('charactersContainer');
            if(container) {
                container.classList.remove('grid-cols-1', 'sm:grid-cols-2', 'md:grid-cols-3', 'lg:grid-cols-4', 'xl:grid-cols-5');
                if(currentCols === 1) container.classList.add('grid-cols-1');
                else if(currentCols === 2) container.classList.add('grid-cols-1', 'sm:grid-cols-2');
                else if(currentCols === 3) container.classList.add('grid-cols-1', 'sm:grid-cols-2', 'md:grid-cols-3');
                else if(currentCols === 4) container.classList.add('grid-cols-1', 'sm:grid-cols-2', 'md:grid-cols-3', 'lg:grid-cols-4');
                else if(currentCols === 5) container.classList.add('grid-cols-1', 'sm:grid-cols-2', 'md:grid-cols-3', 'lg:grid-cols-4', 'xl:grid-cols-5');
            }
        }

        function getLocalStars() {
            const stars = localStorage.getItem('afk_stars');
            return stars ? JSON.parse(stars) : {};
        }

        function saveLocalStar(id, state) {
            const stars = getLocalStars();
            stars[id] = state;
            localStorage.setItem('afk_stars', JSON.stringify(stars));
        }

        async function fetchData() {
            const { data } = await supabaseClient.from('afk_characters').select('*');
            if(data) {
                const localStars = getLocalStars();
                data.forEach(d => {
                    cachedCharacters[d.id] = {
                        ...d, 
                        timers: d.timers || [],
                        is_starred: localStars[d.id] || false
                    };
                    if (expandedStates[d.id] === undefined) expandedStates[d.id] = true;
                });
                renderStructure();
            }
            supabaseClient.channel('db').on('postgres_changes', {event:'*', schema:'public', table:'afk_characters'}, payload => {
                if(payload.eventType === 'DELETE') {
                    for (let key in completedMissionsTracker) {
                        if (key.startsWith(payload.old.id + "_")) delete completedMissionsTracker[key];
                    }
                    delete cachedCharacters[payload.old.id];
                } else {
                    const localStars = getLocalStars();
                    const nextTimerIds = (payload.new.timers || []).map(t => t.id);
                    for (let key in completedMissionsTracker) {
                        if (key.startsWith(payload.new.id + "_")) {
                            const tId = key.split('_')[1];
                            if (!nextTimerIds.includes(tId)) delete completedMissionsTracker[key];
                        }
                    }

                    cachedCharacters[payload.new.id] = {
                        ...payload.new, 
                        timers: payload.new.timers || [],
                        is_starred: localStars[payload.new.id] || false
                    };
                }
                renderStructure();
                updateMasterPopupDOM();
            }).subscribe();
        }

        function toggleExpand(id) { expandedStates[id] = !expandedStates[id]; renderStructure(); }

        function toggleStar(id) {
            const newState = !cachedCharacters[id].is_starred;
            cachedCharacters[id].is_starred = newState;
            saveLocalStar(id, newState);
            renderStructure();
        }

        function getSecondsUntilDeath(char) {
            if (char.is_paused) return Infinity; 
            const now = Date.now() / 1000;
            const elapsed = now - char.status_updated_at;
            const currentFood = Math.max(0, char.food_base - (elapsed * FOOD_DECAY));
            if (currentFood <= 0) return 0;
            return currentFood / FOOD_DECAY;
        }

        function renderStructure() {
            const container = document.getElementById('charactersContainer');
            
            const sortedList = Object.values(cachedCharacters).sort((a, b) => {
                if (a.is_starred !== b.is_starred) return a.is_starred ? -1 : 1;
                if (a.is_paused !== b.is_paused) return a.is_paused ? 1 : -1;
                return getSecondsUntilDeath(a) - getSecondsUntilDeath(b);
            });

            container.innerHTML = sortedList.map(char => {
                const id = char.id;
                const isPaused = char.is_paused;
                const isExpanded = expandedStates[id];
                const isStarred = char.is_starred;
                
                return `
                <div id="card_${id}" class="pixel-card p-4 rounded-none ${isPaused ? 'opacity-40 bg-zinc-900/40' : 'bg-[#0b0e14]'} ${isExpanded ? 'expanded' : 'collapsed'}">
                    <div class="flex items-center justify-between flex-wrap gap-2">
                        <div class="flex items-center gap-3 truncate max-w-[85%]">
                            <div onclick="openEditModal('${id}')" class="w-11 h-11 bg-zinc-950 border-2 border-slate-800 flex items-center justify-center text-2xl flex-shrink-0 clickable hover:border-[#7cd6ff] transition-all">
                                ${char.emoji}
                            </div>
                            <div class="truncate">
                                <div class="flex items-center gap-2">
                                    <button onclick="toggleStar('${id}')" class="text-xl leading-none clickable ${isStarred ? 'star-active' : 'text-slate-700'} transition-transform hover:scale-110">★</button>
                                    <h2 class="text-sm font-bold text-white tracking-wide truncate">${char.char_display_name}</h2>
                                    <button onclick="togglePause('${id}')" class="w-6 h-6 flex items-center justify-center flex-shrink-0 bg-slate-900 border border-slate-700 text-[10px] font-bold hover:bg-slate-800 hover:text-[#7cd6ff] clickable transition-colors">
                                        ${isPaused ? '▶' : '⏸'}
                                    </button>
                                </div>
                                <p id="death_timer_${id}" class="text-[9px] pixel-font mt-1 font-bold text-slate-400">CALCULATING...</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="toggleExpand('${id}')" class="p-1 text-xs text-slate-400 font-bold pixel-font clickable hover:text-white transition-colors">${isExpanded ? '▲' : '▼'}</button>
                            <button onclick="deleteChar('${id}')" class="text-slate-600 hover:text-red-500 text-xs font-bold px-1 transition-colors">X</button>
                        </div>
                    </div>

                    <div class="expand-content">
                        <div class="grid grid-cols-1 gap-3 mb-4">
                            <div class="p-2 border border-slate-900 bg-black/40 hover:border-red-500/40 transition-colors clickable" onclick="quickResetFood('${id}')">
                                <div class="flex justify-between text-[9px] pixel-font text-red-400 mb-1">
                                    <span>HP:ENERGY</span> <span id="tf_${id}">0.0%</span>
                                </div>
                                <div class="rpg-bar-container"><div id="bf_${id}" class="h-full bar-energy transition-all duration-500"></div></div>
                            </div>
                            <div class="p-2 border border-slate-900 bg-black/40 hover:border-sky-500/40 transition-colors clickable" onclick="quickResetBrain('${id}')">
                                <div class="flex justify-between text-[9px] pixel-font text-sky-400 mb-1">
                                    <span>MP:BRAIN</span> <span id="tb_${id}">0.0%</span>
                                </div>
                                <div class="rpg-bar-container"><div id="bb_${id}" class="h-full bar-brain transition-all duration-500"></div></div>
                            </div>
                        </div>
                        
                        <div class="border-t border-dashed border-slate-800 pt-3">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[9px] pixel-font text-slate-500">MISSIONS LIST</span>
                                <button onclick="openAFKModal('${id}')" class="bg-slate-900 text-slate-300 text-[9px] border border-slate-700 px-2 py-0.5 hover:text-white hover:border-[#7cd6ff] clickable transition-all">+ ADD</button>
                            </div>
                            <div id="timers_${id}" class="space-y-2"></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            changeGridColumns(currentCols);
        }

        function tick() {
            const now = Date.now() / 1000;
            let newlyCompletedFound = false;

            for (const id in cachedCharacters) {
                const char = cachedCharacters[id];
                let f = char.food_base, b = char.brain_base;
                if(!char.is_paused) {
                    const elapsed = now - char.status_updated_at;
                    f = Math.max(0, f - (elapsed * FOOD_DECAY));
                    b = Math.min(100, b + (elapsed * BRAIN_GROW));
                }
                
                const elDeath = document.getElementById(`death_timer_${id}`);
                if (elDeath) {
                    if (char.is_paused) {
                        elDeath.innerText = "⏸ PAUSED";
                        elDeath.className = "text-[9px] pixel-font mt-1 text-slate-500";
                    } else if (f <= 0) {
                        elDeath.innerText = "💀 DIED (0%)";
                        elDeath.className = "text-[9px] pixel-font mt-1 text-red-500 animate-pulse";
                    } else {
                        const remSec = f / FOOD_DECAY;
                        const hrs = Math.floor(remSec / 3600);
                        const mins = Math.floor((remSec % 3600) / 60);
                        const secs = Math.floor(remSec % 60);
                        elDeath.innerText = `💀 DIE IN ${hrs}h ${mins}m ${secs}s`;
                        
                        if (remSec < 900) {
                            elDeath.className = "text-[9px] pixel-font mt-1 text-red-400 font-bold animate-bounce";
                        } else {
                            elDeath.className = "text-[9px] pixel-font mt-1 text-[#7cd6ff]";
                        }
                    }
                }

                const elF = document.getElementById(`bf_${id}`), elB = document.getElementById(`bb_${id}`);
                if(elF) {
                    elF.style.width = f + '%';
                    document.getElementById(`tf_${id}`).innerText = f.toFixed(1) + '%';
                    elB.style.width = b + '%';
                    document.getElementById(`tb_${id}`).innerText = b.toFixed(1) + '%';
                    
                    const tContainer = document.getElementById(`timers_${id}`);
                    if(char.timers.length > 0) {
                        tContainer.innerHTML = char.timers.map(t => {
                            let remStr = "";
                            let isDone = false;
                            
                            if (char.is_paused) {
                                remStr = 'PAUSED';
                            } else {
                                const left = t.target_time - now;
                                if (left <= 0) {
                                    remStr = 'SUCCESS';
                                    isDone = true;
                                    
                                    const trackerKey = `${char.id}_${t.id}`;
                                    if (!completedMissionsTracker[trackerKey]) {
                                        completedMissionsTracker[trackerKey] = {
                                            charName: char.char_display_name,
                                            charEmoji: char.emoji,
                                            itemName: t.item_name
                                        };
                                        newlyCompletedFound = true; 
                                    }
                                } else {
                                    remStr = formatTimeWithSeconds(left); // เปลี่ยนมาใช้ฟังก์ชันแบบมีวินาทีที่นี่
                                }
                            }
                            
                            return `
                            <div class="p-2 bg-black/60 border ${isDone ? 'border-red-500 bg-red-950/20' : 'border-slate-900'} flex justify-between items-center transition-all duration-300">
                                <span class="text-xs font-bold ${isDone ? 'text-red-400 animate-pulse' : 'text-slate-400'} truncate pr-2">▪ ${t.item_name}</span>
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] ${isDone ? 'bg-red-600 text-white animate-pulse' : 'bg-slate-800 text-white'} px-1.5 py-0.5 border border-slate-700 font-mono">${remStr}</span>
                                    <button onclick="deleteActivity('${id}', '${t.id}')" class="text-slate-600 hover:text-white font-bold px-1 text-xs transition-colors">✕</button>
                                </div>
                            </div>`;
                        }).join('');
                    } else { tContainer.innerHTML = '<p class="text-[9px] text-slate-700 italic">No live mission...</p>'; }
                }
            }

            if (newlyCompletedFound) {
                playBeepSound();
            }
            updateMasterPopupDOM();
            updateMissionsOverviewLive();
        }

        function updateMasterPopupDOM() {
            const popupEl = document.getElementById('bottomMasterAlert');
            const titleEl = document.getElementById('masterAlertTitle');
            const listEl = document.getElementById('masterAlertList');
            
            const totalDone = Object.keys(completedMissionsTracker).length;
            
            if (totalDone === 0) {
                popupEl.style.display = 'none';
                return;
            }
            
            titleEl.innerText = `${totalDone} MISSION${totalDone > 1 ? 'S' : ''} COMPLETED!`;
            
            let listHTML = "";
            for (let key in completedMissionsTracker) {
                const data = completedMissionsTracker[key];
                listHTML += `<div class="truncate font-semibold text-slate-300 py-0.5 border-b border-slate-900/30">
                    ${data.charEmoji} <span class="text-white">${data.itemName}</span> 
                    <span class="text-[9px] text-slate-500 pixel-font">(${data.charName})</span>
                </div>`;
            }
            listEl.innerHTML = listHTML;
            popupEl.style.display = 'block';
        }

        function openMissionsOverview() {
            openModal('overviewModal');
            updateMissionsOverviewLive();
        }

        function updateMissionsOverviewLive() {
            const overviewContainer = document.getElementById('overview_list');
            if (!overviewContainer || document.getElementById('overviewModal').classList.contains('hidden')) return;

            const now = Date.now() / 1000;
            let allMissions = [];

            for (const charId in cachedCharacters) {
                const char = cachedCharacters[charId];
                char.timers.forEach(t => {
                    let remSec = 0;
                    let isDone = false;
                    
                    if (char.is_paused) {
                        remSec = t.saved_remaining_sec || 0;
                    } else {
                        remSec = t.target_time - now;
                        if (remSec <= 0) {
                            remSec = 0; 
                            isDone = true;
                        }
                    }
                    
                    allMissions.push({
                        charName: char.char_display_name,
                        charEmoji: char.emoji,
                        charId: charId,
                        missionId: t.id,
                        itemName: t.item_name,
                        remSec: remSec,
                        isPaused: char.is_paused,
                        isDone: isDone
                    });
                });
            }

            allMissions.sort((a, b) => {
                if (a.isDone && !b.isDone) return -1;
                if (!a.isDone && b.isDone) return 1;
                return a.remSec - b.remSec;
            });

            if (allMissions.length === 0) {
                overviewContainer.innerHTML = '<p class="text-xs text-slate-600 text-center py-4 pixel-font">NO ACTIVE MISSIONS AT ALL</p>';
                return;
            }

            overviewContainer.innerHTML = allMissions.map(m => {
                let displayTime = "";
                if (m.isPaused) displayTime = 'PAUSED';
                else if (m.isDone) displayTime = '[ SUCCESS ]';
                else displayTime = formatTimeWithSeconds(m.remSec); // เปลี่ยนมาใช้ฟังก์ชันแบบมีวินาทีที่นี่เช่นกัน
                
                return `
                <div class="p-2 border flex justify-between items-center gap-2 ${m.isDone ? 'bg-red-950/40 border-red-500' : 'bg-slate-900/80 border-slate-800'} transition-all">
                    <div class="flex items-center gap-2 truncate">
                        <span class="text-lg">${m.charEmoji}</span>
                        <div class="truncate">
                            <p class="text-[10px] font-bold text-white truncate ${m.isDone ? 'text-red-400 animate-pulse' : ''}">${m.itemName}</p>
                            <p class="text-[8px] text-slate-500 uppercase pixel-font tracking-tighter">Owner: ${m.charName}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <span class="text-[9px] pixel-font font-mono ${m.isDone ? 'text-red-400 font-bold bg-red-900 border-red-500 animate-pulse' : (m.remSec <= 60 && !m.isPaused ? 'text-yellow-400 animate-pulse bg-black border-slate-800' : 'text-slate-300 bg-black border-slate-800')} px-1.5 py-0.5 border">${displayTime}</span>
                        <button onclick="deleteActivity('${m.charId}', '${m.missionId}')" class="text-rose-500 font-bold text-xs px-1 hover:text-white transition-colors">✕</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function quickResetFood(id) { 
            const now = Date.now() / 1000;
            const char = cachedCharacters[id];
            let currentBrain = char.brain_base;
            if(!char.is_paused) {
                const elapsed = now - char.status_updated_at;
                currentBrain = Math.min(100, currentBrain + (elapsed * BRAIN_GROW));
            }
            await supabaseClient.from('afk_characters').update({
                food_base: 100, 
                brain_base: currentBrain,
                status_updated_at: now
            }).eq('id', id); 
            setTimeout(renderStructure, 300); 
        }

        async function quickResetBrain(id) { 
            const now = Date.now() / 1000;
            const char = cachedCharacters[id];
            let currentFood = char.food_base;
            if(!char.is_paused) {
                const elapsed = now - char.status_updated_at;
                currentFood = Math.max(0, currentFood - (elapsed * FOOD_DECAY));
            }
            await supabaseClient.from('afk_characters').update({
                food_base: currentFood, 
                brain_base: 0, 
                status_updated_at: now
            }).eq('id', id); 
        }

        async function deleteActivity(charId, timerId) {
            const char = cachedCharacters[charId];
            if (!char) return;
            const updatedTimers = char.timers.filter(t => t.id !== timerId);
            
            const trackerKey = `${charId}_${timerId}`;
            delete completedMissionsTracker[trackerKey];

            await supabaseClient.from('afk_characters').update({ timers: updatedTimers }).eq('id', charId);
        }

        async function submitAddCharacter() {
            const name = document.getElementById('add_char_name').value.trim();
            if(!name) return;
            const newChar = {
                id: "char_" + Date.now(),
                char_display_name: name,
                emoji: document.getElementById('add_char_emoji').value,
                food_base: parseFloat(document.getElementById('add_food').value) || 100,
                brain_base: parseFloat(document.getElementById('add_brain').value) || 0,
                status_updated_at: Date.now() / 1000,
                is_paused: false,
                timers: []
            };
            await supabaseClient.from('afk_characters').insert([newChar]);
            closeModal('addCharModal');
        }

        async function togglePause(id) {
            const char = cachedCharacters[id];
            const now = Date.now() / 1000;
            const updates = { is_paused: !char.is_paused, status_updated_at: now };
            if(!char.is_paused) {
                const elap = now - char.status_updated_at;
                updates.food_base = Math.max(0, char.food_base - (elap * FOOD_DECAY));
                updates.brain_base = Math.min(100, char.brain_base + (elap * BRAIN_GROW));
                char.timers.forEach(t => t.saved_remaining_sec = Math.max(0, t.target_time - now));
            } else {
                char.timers.forEach(t => t.target_time = now + (t.saved_remaining_sec || 0));
            }
            updates.timers = char.timers;
            await supabaseClient.from('afk_characters').update(updates).eq('id', id);
            setTimeout(renderStructure, 100);
        }

        async function deleteChar(id) { if(confirm("DELETE UNIT?")) await supabaseClient.from('afk_characters').delete().eq('id', id); }

        function openModal(m) { 
            const modal = document.getElementById(m);
            modal.classList.remove('hidden');
            setTimeout(() => modal.style.opacity = "1", 10);
        }
        function closeModal(m) { 
            const modal = document.getElementById(m);
            modal.style.opacity = "0";
            setTimeout(() => modal.classList.add('hidden'), 200);
        }
        
        function openEditModal(id) {
            const char = cachedCharacters[id];
            document.getElementById('edit_old_id').value = id;
            document.getElementById('edit_char_name').value = char.char_display_name;
            document.getElementById('edit_food').value = char.food_base.toFixed(1);
            document.getElementById('edit_brain').value = char.brain_base.toFixed(1);
            setEditEmoji(char.emoji);
            openModal('editModal');
        }

        async function submitEditStatus() {
            const id = document.getElementById('edit_old_id').value;
            await supabaseClient.from('afk_characters').update({
                char_display_name: document.getElementById('edit_char_name').value,
                food_base: parseFloat(document.getElementById('edit_food').value),
                brain_base: parseFloat(document.getElementById('edit_brain').value),
                emoji: document.getElementById('edit_char_emoji').value,
                status_updated_at: Date.now() / 1000
            }).eq('id', id);
            closeModal('editModal');
        }

        function openAFKModal(id) { document.getElementById('afk_char_name').value = id; openModal('afkModal'); }
        async function submitAFK() {
            const id = document.getElementById('afk_char_name').value;
            const task = document.getElementById('afk_task_name').value || "Working";
            const mins = parseInt(document.getElementById('afk_minutes').value) || 30;
            const now = Date.now() / 1000;
            const newTimer = { id: Math.random().toString(36).substr(2,9), item_name: task, target_time: now + (mins * 60) };
            if(cachedCharacters[id].is_paused) newTimer.saved_remaining_sec = mins * 60;
            cachedCharacters[id].timers.push(newTimer);
            await supabaseClient.from('afk_characters').update({timers: cachedCharacters[id].timers}).eq('id', id);
            closeModal('afkModal');
        }

        function buildEmojiPools() {
            ['add_emoji_pool', 'edit_emoji_pool'].forEach(pId => {
                const pool = document.getElementById(pId);
                pool.innerHTML = EMOJIS.map(e => `
                    <button type="button" onclick="${pId.startsWith('add') ? 'setEmoji' : 'setEditEmoji'}('${e}', this)" 
                            class="emoji-btn p-2 text-xl flex items-center justify-center clickable">
                        ${e}
                    </button>
                `).join('');
            });
        }
        function setEmoji(e, btn) {
            document.getElementById('add_char_emoji').value = e;
            document.querySelectorAll('#add_emoji_pool .emoji-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
        function setEditEmoji(e, btn) {
            document.getElementById('edit_char_emoji').value = e;
            document.querySelectorAll('#edit_emoji_pool .emoji-btn').forEach(b => {
                b.classList.remove('selected');
                if(b.innerText.trim() === e) b.classList.add('selected');
            });
            if(btn) btn.classList.add('selected');
        }
    </script>
</body>
