<html lang="th">
<head>
    <meta charset="UTF-8">

    <style>
        :root { 
            --bg-main: #09090b; 
            --border-main: #a1a1aa; 
            --card-bg: #121214; 
            --text-muted: #71717a;
        }
        
        html { scroll-behavior: smooth; }

        body { 
            background-color: var(--bg-main); 
            color: #e4e4e7; 
            font-family: 'Mitr', sans-serif;
            image-rendering: pixelated;
            background-image: linear-gradient(rgba(24, 24, 27, 0.6) 1px, transparent 1px), linear-gradient(90deg, rgba(24, 24, 27, 0.6) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; }
        
        .cyber-header {
            background: linear-gradient(135deg, #121214 0%, #18181b 100%);
            border: 3px solid var(--border-main);
            position: relative;
            overflow: hidden;
        }
        .cyber-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--border-main), transparent);
            animation: scanline 7s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .pixel-box {
            background: var(--card-bg);
            border: 3px solid #27272a;
        }

        .pixel-card {
            background: #121214;
            border: 3px solid #202024;
            box-shadow: 6px 6px 0px #000000;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .pixel-card:hover {
            border-color: var(--border-main);
            transform: translateY(-2px);
        }

        .dead-card {
            background: #000000 !important;
            border: 3px solid #27272a !important;
            box-shadow: 2px 2px 0px #18181b !important;
            filter: grayscale(0.8);
            opacity: 0.65;
        }
        
        .pixel-btn {
            background: #e4e4e7;
            color: #09090b;
            border: 3px solid #000000;
            box-shadow: 0px 4px 0px #27272a;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .pixel-btn:hover {
            background: #a1a1aa;
            box-shadow: 0px 4px 0px #52525b;
        }
        .pixel-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px #000000;
        }

        .pixel-btn-neon {
            background: #18181b;
            color: #a1a1aa;
            border: 3px solid #a1a1aa;
            box-shadow: 0px 4px 0px #3f3f46;
            transition: all 0.2s ease;
        }
        .pixel-btn-neon:hover {
            background: #a1a1aa;
            color: #09090b;
        }
        
        .rpg-bar-container { 
            background: #000000; 
            height: 16px; 
            border: 2px solid #27272a;
            padding: 1px;
        }
        .bar-energy { background: #b91c1c; }
        .bar-brain { background: #52525b; }
        .bar-dead { background: #18181b !important; }

        .clickable { cursor: pointer; }

        .expand-content { 
            max-height: 0;
            overflow: hidden; 
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease, opacity 0.3s ease; 
            opacity: 0;
        }
        .expanded .expand-content { 
            max-height: 1200px; 
            padding-top: 1rem;
            opacity: 1;
        }

        .emoji-btn { 
            border: 3px solid transparent; 
            background: #18181b;
            transition: all 0.2s ease;
        }
        .emoji-btn:hover { border-color: #3f3f46; }
        .emoji-btn.selected { 
            border-color: var(--border-main); 
            background: #e4e4e7;
        }
        
        .star-active { color: #ccaf00; }

        .cyber-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #202024;
            border: 1px solid #3f3f46;
            outline: none;
            border-radius: 3px;
        }
        .cyber-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #a1a1aa;
            border: 2px solid #000;
            cursor: pointer;
        }

        .cyber-select {
            background: #09090b;
            color: #a1a1aa;
            border: 1px solid #3f3f46;
            padding: 0 8px;
            height: 40px;
            font-size: 9px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .cyber-select:hover {
            border-color: #a1a1aa;
            color: #fff;
        }

        #bottomMasterAlert {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 100%;
            max-width: 420px;
            padding: 0 16px;
            display: none; 
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #deathWarningStack {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
            width: calc(100% - 48px);
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        @media (max-width: 640px) {
            #deathWarningStack {
                left: 50%;
                right: auto;
                transform: translateX(-50%);
            }
        }

        .toast-warn-card {
            pointer-events: auto;
            background: #09090b;
            border: 4px solid #dc2626;
            box-shadow: 6px 6px 0px #450a0a;
            padding: 14px;
            overflow: hidden;
            max-height: 54px;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease;
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .toast-warn-card:hover {
            max-height: 150px;
            box-shadow: 6px 6px 16px rgba(220, 38, 38, 0.5);
        }

        .toast-detail-zone {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px dashed #450a0a;
        }
        .toast-warn-card:hover .toast-detail-zone {
            opacity: 1;
            visibility: visible;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-bg {
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .live-pulse { animation: pulse-gray 2.5s infinite; }
        @keyframes pulse-gray {
            0% { transform: scale(0.95); opacity: 0.4; }
            70% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(0.95); opacity: 0.4; }
        }

        @keyframes pulse-red-border {
            0% { border-color: #b91c1c; box-shadow: 6px 6px 0px #450a0a; }
            50% { border-color: #f87171; box-shadow: 6px 6px 8px rgba(185, 28, 28, 0.5); }
            100% { border-color: #b91c1c; box-shadow: 6px 6px 0px #450a0a; }
        }
        .near-death-card {
            background: #1a1010 !important;
            animation: pulse-red-border 1.5s infinite !important;
        }
    </style>
</head>

        function formatTimeWithSeconds(totalSeconds) {
            if (totalSeconds <= 0) return 'SUCCESS';
            const hrs = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = Math.floor(totalSeconds % 60);
            if (hrs > 0) return `${hrs}H ${mins}M ${secs}S`;
            return `${mins}M ${secs}S`;
        }

        function formatDigitalTime(totalSeconds) {
            const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const secs = String(Math.floor(totalSeconds % 60)).padStart(2, '0');
            return `${hrs}:${mins}:${secs}`;

            if (isMuted) return;

                    case "heavy-warning": {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.type = 'triangle'; osc.frequency.setValueAtTime(120, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(70, audioCtx.currentTime + 0.4);
                        gain.gain.setValueAtTime(0.25, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
                        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.45); break;
                    }
                    case "sub-sonar": {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.type = 'sine'; osc.frequency.setValueAtTime(2200, audioCtx.currentTime); gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7); osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.7); break;
                    }
                    case "digital-chime": {
                        const now = audioCtx.currentTime;
                        [587.33, 880, 1174.66].forEach((f, i) => {
                            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                            osc.type = 'sine'; osc.frequency.setValueAtTime(f, now + (i * 0.04)); gain.gain.setValueAtTime(0.04, now + (i * 0.04));
                            gain.gain.exponentialRampToValueAtTime(0.001, now + (i * 0.04) + 0.2); osc.connect(gain); gain.connect(audioCtx.destination);
                            osc.start(now + (i * 0.04)); osc.stop(now + (i * 0.04) + 0.2);
                        }); break;
                    }
                    case "level-up": {
                        const now = audioCtx.currentTime; const notes = [523.25, 659.25, 783.99, 1046.50]; 
                        notes.forEach((freq, idx) => {
                            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                            osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, now + (idx * 0.06)); gain.gain.setValueAtTime(0.06, now + (idx * 0.06));
                            gain.gain.linearRampToValueAtTime(0.001, now + (idx * 0.06) + 0.1); osc.connect(gain); gain.connect(audioCtx.destination);
                            osc.start(now + (idx * 0.06)); osc.stop(now + (idx * 0.06) + 0.1);
                        }); break;
                    }
                    case "laser-shoot": {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                        gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.2); break;
                    }
                    case "mech-click": {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.type = 'triangle'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.setValueAtTime(300, audioCtx.currentTime + 0.02);
                        gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05); break;
                    }
                }
            } catch(e) {}
        }

        async function fetchData() {
            const { data } = await supabaseClient.from('afk_characters').select('*');
            if(data) {
                const localStars = getLocalStars();
                data.forEach(d => {
                    // ดึงค่า Laps จาก LocalStorage (ถ้าไม่มีในเครื่อง ให้ดึงค่าเริ่มต้นของ Database มาใส่แทน)
                    const savedLocalLaps = localStorage.getItem(`afk_laps_${d.id}`);
                    const finalLaps = savedLocalLaps !== null ? parseInt(savedLocalLaps) : (d.laps || 0);

                    cachedCharacters[d.id] = { ...d, timers: d.timers || [], laps: finalLaps, is_starred: localStars[d.id] || false };
                    if (expandedStates[d.id] === undefined) expandedStates[d.id] = true;
                    if (globalLapModes[d.id] === undefined) globalLapModes[d.id] = 'plus'; 
                });
                renderStructure();
            }
            supabaseClient.channel('db').on('postgres_changes', {event:'*', schema:'public', table:'afk_characters'}, payload => {
                if(payload.eventType === 'DELETE') {
                    for (let key in completedMissionsTracker) { if (key.startsWith(payload.old.id + "_")) delete completedMissionsTracker[key]; }
                    delete cachedCharacters[payload.old.id]; delete deathWarnedUnits[payload.old.id]; removeBottomWarning(payload.old.id);
                } else {
                    const localStars = getLocalStars(); const nextTimerIds = (payload.new.timers || []).map(t => t.id);
                    for (let key in completedMissionsTracker) { if (key.startsWith(payload.new.id + "_")) { const tId = key.split('_')[1]; if (!nextTimerIds.includes(tId)) delete completedMissionsTracker[key]; } }
                    if (cachedCharacters[payload.new.id] && payload.new.food_base > cachedCharacters[payload.new.id].food_base) { delete deathWarnedUnits[payload.new.id]; removeBottomWarning(payload.new.id); }
                    
                    // ป้องกันการทับซ้อนของข้อมูล Realtime สำหรับตัวแปร Laps ฝั่ง Local
                    const savedLocalLaps = localStorage.getItem(`afk_laps_${payload.new.id}`);
                    const finalLaps = savedLocalLaps !== null ? parseInt(savedLocalLaps) : (payload.new.laps || 0);

                    cachedCharacters[payload.new.id] = { ...payload.new, timers: payload.new.timers || [], laps: finalLaps, is_starred: localStars[payload.new.id] || false };
                }
                renderStructure(); updateMasterPopupDOM();
            }).subscribe();
        }

        function getSecondsUntilDeath(char) {
            if (char.is_paused) return Infinity; const now = Date.now() / 1000; const elapsed = now - char.status_updated_at;
            const currentFood = Math.max(0, char.food_base - (elapsed * FOOD_DECAY)); if (currentFood <= 0) return 0; return currentFood / FOOD_DECAY;
        }

            }

        async function executeLapClick(id) {
            const char = cachedCharacters[id]; if (!char) return;
            const currentMode = globalLapModes[id] || 'plus';
            let currentLaps = char.laps || 0;
            
            let nextLaps = currentMode === 'plus' ? currentLaps + 1 : currentLaps - 1;
            if(nextLaps < 0) nextLaps = 0;

            cachedCharacters[id].laps = nextLaps;
            
            // บันทึกค่าวัด Laps ลงหน่วยความจำ LocalStorage ประจำเบราว์เซอร์
            localStorage.setItem(`afk_laps_${id}`, nextLaps);

            const el = document.getElementById(`lap_val_${id}`);

            await supabaseClient.from('afk_characters').update({ laps: nextLaps }).eq('id', id);

        function openEditMissionModal(charId, timerId, event) {
            if(event) event.stopPropagation();

            let currentRemMin = char.is_paused 
                ? Math.round((targetTimer.saved_remaining_sec || 0) / 60)
                : Math.round(Math.max(0, targetTimer.target_time - now) / 60);

            document.getElementById('edit_m_minutes').value = currentRemMin;
            openModal('editMissionModal');

        async function submitEditMission() {
            const charId = document.getElementById('edit_m_char_id').value;
            const timerId = document.getElementById('edit_m_timer_id').value;
            const newName = document.getElementById('edit_m_task_name').value.trim() || "Working";
            const newMins = parseInt(document.getElementById('edit_m_minutes').value) || 0;

            const char = cachedCharacters[charId]; if (!char) return;
            const now = Date.now() / 1000;

            const updatedTimers = char.timers.map(t => {
                if (t.id === timerId) {
                    const updatedObj = { ...t, item_name: newName };
                    if (char.is_paused) { updatedObj.saved_remaining_sec = newMins * 60; } 
                    else { updatedObj.target_time = now + (newMins * 60); }
                    return updatedObj;
                }
                return t;
            });

            delete completedMissionsTracker[`${charId}_${timerId}`];
            await supabaseClient.from('afk_characters').update({ timers: updatedTimers }).eq('id', charId);
            closeModal('editMissionModal');
        }

        function tick() {
            const now = Date.now() / 1000; let newlyCompletedFoundForChars = [];

            for (const id in cachedCharacters) {
                const char = cachedCharacters[id]; let f = char.food_base, b = char.brain_base;
                if(!char.is_paused) {
                    const elapsed = now - char.status_updated_at;
                    f = Math.max(0, f - (elapsed * FOOD_DECAY)); b = Math.min(100, b + (elapsed * BRAIN_GROW));
                }
                
                const elCard = document.getElementById(`card_${id}`);
                const elDeath = document.getElementById(`death_timer_${id}`);
                const elToastClock = document.getElementById(`toast_clock_${id}`);
                
                if (elDeath) {
                    if (char.is_paused) { elDeath.innerText = "⏸ PAUSED"; elDeath.className = "text-[9px] pixel-font mt-1 text-zinc-600"; if (elCard) elCard.classList.remove('near-death-card'); } 
                    else if (f <= 0) {
                        elDeath.innerText = "💀 DIED (0%)"; elDeath.className = "text-[9px] pixel-font mt-1 text-zinc-600 font-bold";
                        if (elCard) { elCard.classList.remove('near-death-card'); if (!elCard.classList.contains('dead-card')) elCard.classList.add('dead-card'); }
                        removeBottomWarning(id); 
                    } else {
                        const remSec = f / FOOD_DECAY; elDeath.innerText = `💀 DIE: ${formatDigitalTime(remSec)}`;
                        if (elToastClock) elToastClock.innerText = `เวลาที่เหลือ: ${formatDigitalTime(remSec)}`;

                        if (remSec <= 300 && !deathWarnedUnits[id]) { deathWarnedUnits[id] = true; playBeepSound(id); showBottomWarning(id, char.char_display_name, char.emoji, remSec); }
                        if (elCard) { if (remSec <= 300) { elCard.classList.add('near-death-card'); elCard.classList.remove('dead-card'); } else { elCard.classList.remove('near-death-card'); elCard.classList.remove('dead-card'); } }
                        if (remSec < 900) elDeath.className = "text-[9px] pixel-font mt-1 text-red-400 font-bold animate-bounce";
                        else elDeath.className = "text-[9px] pixel-font mt-1 text-zinc-400";
                    }
                }

                const elF = document.getElementById(`bf_${id}`), elB = document.getElementById(`bb_${id}`);
                if(elF) {
                    elF.style.width = f + '%'; document.getElementById(`tf_${id}`).innerText = f.toFixed(1) + '%';
                    elB.style.width = b + '%'; document.getElementById(`tb_${id}`).innerText = b.toFixed(1) + '%';
                    
                    const tContainer = document.getElementById(`timers_${id}`);
                    if(char.timers.length > 0) {
                        tContainer.innerHTML = char.timers.map(t => {
                            let remStr = ""; let isDone = false;
                            if (char.is_paused) { remStr = 'PAUSED'; } 
                            else {
                                const left = t.target_time - now;
                                if (left <= 0) {
                                    remStr = 'SUCCESS'; isDone = true;
                                    const trackerKey = `${char.id}_${t.id}`;
                                    if (!completedMissionsTracker[trackerKey]) {
                                        completedMissionsTracker[trackerKey] = { charName: char.char_display_name, charEmoji: char.emoji, itemName: t.item_name };
                                        newlyCompletedFoundForChars.push(char.id);
                                    }
                                } else { remStr = formatTimeWithSeconds(left); }
                            }
                            
                            return `
                            <div onclick="openEditMissionModal('${id}', '${t.id}', event)" class="p-2 bg-black/60 border ${isDone ? 'border-zinc-500 bg-zinc-900/20' : 'border-zinc-900'} flex justify-between items-center hover:border-zinc-500 transition-all duration-300 clickable">
                                <span class="text-xs font-bold text-zinc-400 truncate pr-2">▪ ${t.item_name}</span>
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] ${isDone ? 'bg-zinc-700 text-white animate-pulse' : 'bg-zinc-800 text-zinc-300'} px-1.5 py-0.5 border border-zinc-700 font-mono">${remStr}</span>
                                    <button onclick="event.stopPropagation(); deleteActivity('${id}', '${t.id}')" class="text-zinc-600 hover:text-white font-bold px-1 text-xs transition-colors">✕</button>
                                </div>
                            </div>`;
                        }).join('');
                    } else { tContainer.innerHTML = '<p class="text-[9px] text-zinc-700 italic">No live mission...</p>'; }
                }
            }

            if (newlyCompletedFoundForChars.length > 0) {
                const unmutedBot = newlyCompletedFoundForChars.find(bId => localStorage.getItem(`afk_mute_${bId}`) !== 'true');
                if (unmutedBot) playBeepSound(unmutedBot);
            }
            updateMasterPopupDOM(); updateMissionsOverviewLive();
        }

        function updateMasterPopupDOM() {
            const popupEl = document.getElementById('bottomMasterAlert'); const titleEl = document.getElementById('masterAlertTitle'); const listEl = document.getElementById('masterAlertList');
            const totalDone = Object.keys(completedMissionsTracker).length;
            if (totalDone === 0) { popupEl.style.display = 'none'; return; }
            
            titleEl.innerText = `${totalDone} MISSION${totalDone > 1 ? 'S' : ''} COMPLETED!`;
            let listHTML = "";
            for (let key in completedMissionsTracker) {
                const data = completedMissionsTracker[key];
                listHTML += `<div class="truncate font-semibold text-zinc-300 py-0.5 border-b border-zinc-900/30">
                    ${data.charEmoji} <span class="text-white">${data.itemName}</span> <span class="text-[9px] text-zinc-500 pixel-font">(${data.charName})</span>
                </div>`;
            }
            listEl.innerHTML = listHTML; popupEl.style.display = 'block';
        }

        function openMissionsOverview() { openModal('overviewModal'); updateMissionsOverviewLive(); }

        function updateMissionsOverviewLive() {
            const overviewContainer = document.getElementById('overview_list'); if (!overviewContainer || document.getElementById('overviewModal').classList.contains('hidden')) return;
            const now = Date.now() / 1000; let allMissions = [];

            for (const charId in cachedCharacters) {
                const char = cachedCharacters[charId];
                char.timers.forEach(t => {
                    let remSec = 0; let isDone = false;
                    if (char.is_paused) { remSec = t.saved_remaining_sec || 0; } 
                    else { remSec = t.target_time - now; if (remSec <= 0) { remSec = 0; isDone = true; } }
                    allMissions.push({ charName: char.char_display_name, charEmoji: char.emoji, charId: charId, missionId: t.id, itemName: t.item_name, remSec: remSec, isPaused: char.is_paused, isDone: isDone });
                });
            }

            allMissions.sort((a, b) => { if (a.isDone && !b.isDone) return -1; if (!a.isDone && b.isDone) return 1; return a.remSec - b.remSec; });
            if (allMissions.length === 0) { overviewContainer.innerHTML = '<p class="text-xs text-zinc-600 text-center py-4 pixel-font">NO ACTIVE MISSIONS AT ALL</p>'; return; }

            overviewContainer.innerHTML = allMissions.map(m => {
                let displayTime = m.isPaused ? 'PAUSED' : (m.isDone ? '[ SUCCESS ]' : formatTimeWithSeconds(m.remSec));
                return `
                <div onclick="openEditMissionModal('${m.charId}', '${m.missionId}', event)" class="p-2 border flex justify-between items-center gap-2 ${m.isDone ? 'bg-zinc-900/40 border-zinc-500' : 'bg-zinc-900/80 border-zinc-800'} hover:border-zinc-500 transition-all clickable">
                    <div class="flex items-center gap-2 truncate">
                        <span class="text-lg">${m.charEmoji}</span>
                        <div class="truncate">
                            <p class="text-[10px] font-bold text-white truncate ${m.isDone ? 'text-zinc-400 animate-pulse' : ''}">${m.itemName}</p>
                            <p class="text-[8px] text-zinc-500 uppercase pixel-font tracking-tighter">Owner: ${m.charName}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <span class="text-[9px] pixel-font font-mono ${m.isDone ? 'text-zinc-400 font-bold bg-zinc-800 border-zinc-600 animate-pulse' : (m.remSec <= 60 && !m.isPaused ? 'text-yellow-500 animate-pulse bg-black border-zinc-800' : 'text-zinc-300 bg-black border-zinc-800')} px-1.5 py-0.5 border">${displayTime}</span>
                        <button onclick="event.stopPropagation(); deleteActivity('${m.charId}', '${m.missionId}')" class="text-zinc-500 font-bold text-xs px-1 hover:text-white transition-colors">✕</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function quickResetFood(id) { 
            const now = Date.now() / 1000; const char = cachedCharacters[id]; let currentBrain = char.brain_base;
            if(!char.is_paused) { const elapsed = now - char.status_updated_at; currentBrain = Math.min(100, currentBrain + (elapsed * BRAIN_GROW)); }
            delete deathWarnedUnits[id]; removeBottomWarning(id); 
            await supabaseClient.from('afk_characters').update({ food_base: 100, brain_base: currentBrain, status_updated_at: now }).eq('id', id); 
            setTimeout(renderStructure, 300); 
        }

        async function quickResetBrain(id) { 
            const now = Date.now() / 1000; const char = cachedCharacters[id]; let currentFood = char.food_base;
            if(!char.is_paused) { const elapsed = now - char.status_updated_at; currentFood = Math.max(0, currentFood - (elapsed * FOOD_DECAY)); }
            await supabaseClient.from('afk_characters').update({ food_base: currentFood, brain_base: 0, status_updated_at: now }).eq('id', id); 
        }

        async function deleteActivity(charId, timerId) {
            const char = cachedCharacters[charId]; if (!char) return;
            const updatedTimers = char.timers.filter(t => t.id !== timerId);
            delete completedMissionsTracker[`${charId}_${timerId}`];
            await supabaseClient.from('afk_characters').update({ timers: updatedTimers }).eq('id', charId);
        }

        async function submitAddCharacter() {
            const name = document.getElementById('add_char_name').value.trim(); if(!name) return;
            const newChar = { id: "char_" + Date.now(), char_display_name: name, emoji: document.getElementById('add_char_emoji').value, food_base: parseFloat(document.getElementById('add_food').value) || 100, brain_base: parseFloat(document.getElementById('add_brain').value) || 0, status_updated_at: Date.now() / 1000, is_paused: false, timers: [], laps: 0 };
            await supabaseClient.from('afk_characters').insert([newChar]); closeModal('addCharModal');
        }

        async function togglePause(id) {
            const char = cachedCharacters[id]; const now = Date.now() / 1000; const updates = { is_paused: !char.is_paused, status_updated_at: now };
            if(!char.is_paused) {
                const elap = now - char.status_updated_at; updates.food_base = Math.max(0, char.food_base - (elap * FOOD_DECAY)); updates.brain_base = Math.min(100, char.brain_base + (elap * BRAIN_GROW));
                char.timers.forEach(t => t.saved_remaining_sec = Math.max(0, t.target_time - now));
            } else { char.timers.forEach(t => t.target_time = now + (t.saved_remaining_sec || 0)); delete deathWarnedUnits[id]; removeBottomWarning(id); }
            updates.timers = char.timers; await supabaseClient.from('afk_characters').update(updates).eq('id', id); setTimeout(renderStructure, 100);
        }

        async function deleteChar(id) { 
            if(confirm("DELETE UNIT?")) { 
                // ลบประวัติ Laps ของบอทตัวนี้ที่บันทึกอยู่ในเครื่องออกด้วยเพื่อไม่ให้รก LocalStorage
                localStorage.removeItem(`afk_laps_${id}`);
                await supabaseClient.from('afk_characters').delete().eq('id', id); 
            } 
        }

        function openModal(m) { const modal = document.getElementById(m); modal.classList.remove('hidden'); setTimeout(() => modal.style.opacity = "1", 10); }
        function closeModal(m) { const modal = document.getElementById(m); modal.style.opacity = "0"; setTimeout(() => modal.classList.add('hidden'), 200); }
        
        function openEditModal(id) {
            const char = cachedCharacters[id]; document.getElementById('edit_old_id').value = id; document.getElementById('edit_char_name').value = char.char_display_name;
            document.getElementById('edit_food').value = char.food_base.toFixed(1); document.getElementById('edit_brain').value = char.brain_base.toFixed(1); setEditEmoji(char.emoji); openModal('editModal');
        }

        async function submitEditStatus() {
            const id = document.getElementById('edit_old_id').value; delete deathWarnedUnits[id]; removeBottomWarning(id);
            await supabaseClient.from('afk_characters').update({ char_display_name: document.getElementById('edit_char_name').value, food_base: parseFloat(document.getElementById('edit_food').value), brain_base: parseFloat(document.getElementById('edit_brain').value), emoji: document.getElementById('edit_char_emoji').value, status_updated_at: Date.now() / 1000 }).eq('id', id);
            closeModal('editModal');
        }

        function openAFKModal(id) { document.getElementById('afk_char_name').value = id; openModal('afkModal'); }
        async function submitAFK() {
            const id = document.getElementById('afk_char_name').value; const task = document.getElementById('afk_task_name').value || "Working"; const mins = parseInt(document.getElementById('afk_minutes').value) || 30; const now = Date.now() / 1000;
            const newTimer = { id: Math.random().toString(36).substr(2,9), item_name: task, target_time: now + (mins * 60) };
            if(cachedCharacters[id].is_paused) newTimer.saved_remaining_sec = mins * 60; cachedCharacters[id].timers.push(newTimer);
            await supabaseClient.from('afk_characters').update({timers: cachedCharacters[id].timers}).eq('id', id); closeModal('afkModal');
        }

        function buildEmojiPools() {
            ['add_emoji_pool', 'edit_emoji_pool'].forEach(pId => {
                const pool = document.getElementById(pId);
                pool.innerHTML = EMOJIS.map(e => `<button type="button" onclick="${pId.startsWith('add') ? 'setEmoji' : 'setEditEmoji'}('${e}', this)" class="emoji-btn p-2 text-xl flex items-center justify-center clickable">${e}</button>`).join('');
            });
        }
        function setEmoji(e, btn) { document.getElementById('add_char_emoji').value = e; document.querySelectorAll('#add_emoji_pool .emoji-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); }
        function setEditEmoji(e, btn) { document.getElementById('edit_char_emoji').value = e; document.querySelectorAll('#edit_emoji_pool .emoji-btn').forEach(b => { b.classList.remove('selected'); if(b.innerText.trim() === e) b.classList.add('selected'); }); if(btn) btn.classList.add('selected'); }
    </script>
</body>
</html>
